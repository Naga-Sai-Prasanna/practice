services:
  catalogue:
    build: ./catalogue
    image: kopparthiprasanna/catalogue:1.0.0 
    depends_on:
    - mongodb  

  user:
    build: ./user
    image:  kopparthiprasanna/user:1.0.0   
    depends_on:
    - redis

  cart:
    build: ./cart
    image: kopparthiprasanna/cart:1.0.0   
    depends_on: 
    - redis

  frontend:
    build: ./frontend
    image:  kopparthiprasanna/frontend:1.0.0 
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart

  mongodb:
    build: ./mongodb
    image: kopparthiprasanna/mongodb:1.0.0 
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

networks:
 default:
  driver: bridge
  name: roboshop
  external: false # if true you need to create network manually.





