# headless service
apiVersion: v1
kind: Service
metadata: 
  name: mongodb-headless
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb

spec:  
  clusterIP: None # headless service
  selector:
  # labels are used as selectors.so service add the pod which is having these labels.
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017 # service port
    targetPort: 27017 # container port  



---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
  serviceName: "mongodb-headless" # we should attach headless service
  replicas: 3 # by default is 1
  minReadySeconds: 10 # by default is 0

  # pod definition

  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: prasanna/mongodb:1.0.0
        volumeMounts:
        - name: mongodb
          mountPath: /data/db #in docker we gave this path as data path. so we should give this path here also.

  # pvc definition

  volumeClaimTemplates:
  - metadata:
      name: mongodb
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs" #copy data form ebs-sc and created a file here
      resources:
        requests:
          storage: 1Gi
