apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: shipping
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: shipping

spec:
  replicas: 1
  selector: 
    # using these labels replica set selects the pod    
    matchLabels:
     project: roboshop
     tier: backend
     component: shipping

    # this is pod definition, pod is subset of replica
  template:
    metadata: 
      labels:
        project: roboshop
        tier: backend
        component: shipping
    spec:
     containers:
     - name: shipping
       image: kopparthiprasanna/shipping:1.4.0
       imagePullPolicy: Always # this is safe to pull everytime, tehre may be images with same version rebuild and pushed.
    # Adding resources and probes are the best practices.   
       resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "100m"
          memory: "128Mi" 
        
       readinessProbe:
        # httpGet:
        #   path: /health
        #   port: 8080
     # here you can give httpget ot tcp socket
        tcpSocket:
          port: 8080
        failureThreshold: 2
        periodSeconds: 10
        initialDelaySeconds: 15  

        # ading startup-probe
       startupProbe:
        httpGet:
          path: /health
          port: 8080  
        failureThreshold: 20
        periodSeconds: 10

       livenessProbe:
        httpGet:
          path: /health
          port: 8080  
        failureThreshold: 2
        periodSeconds: 10
        initialDelaySeconds: 10  
       envFrom:
       - configMapRef:
          name: shipping

---

apiVersion: v1
kind: Service
metadata: 
  name: shipping
  namespace: roboshop
  labels:
        project: roboshop
        tier: backend
        component: shipping

spec:  
  selector:
  # labels are used as selectors.so service add the pod which is having these labels.
    project: roboshop
    tier: backend
    component: shipping
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port  
