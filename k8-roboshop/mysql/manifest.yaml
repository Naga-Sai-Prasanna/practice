apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: db
    component: mysql

spec:
  replicas: 1
  selector: 
    # using these labels replica set selects the pod    
    matchLabels:
     project: roboshop
     tier: db
     component: mysql

    # this is pod definition, pod is subset of replica
  template:
    metadata: 
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
     containers:
     - name: mysql
       image: kopparthiprasanna/mysql:1.4.0


---

apiVersion: v1
kind: Service
metadata: 
  name: mysql
  namespace: roboshop
  labels:
        project: roboshop
        tier: db
        component: mysql

spec:  
  selector:
  # labels are used as selectors.so service add the pod which is having these labels.
    project: roboshop
    tier: db
    component: mysql
  ports:
  - protocol: TCP
    port: 3306 # service port
    targetPort: 3306 # container port  
