apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: db
    component: redis

spec:
  replicas: 1
  selector: 
    # using these labels replica set selects the pod    
    matchLabels:
     project: roboshop
     tier: db
     component: redis

    # this is pod definition, pod is subset of replica
  template:
    metadata: 
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
     containers:
     - name: redis
       image: redis:7.0



---

apiVersion: v1
kind: Service
metadata: 
  name: redis
  namespace: roboshop
  labels:
        project: roboshop
        tier: db
        component: redis

spec:  
  selector:
  # labels are used as selectors.so service add the pod which is having these labels.
    project: roboshop
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379 # service port
    targetPort: 6379 # container port  

