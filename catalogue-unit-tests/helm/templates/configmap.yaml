# config file from k8-resource
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: {{ .Values.namespace }}
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: catalogue
data:
  MONGO: "true" 
  MONGO_URL: {{ .Values.configMap.MONGO_URL }}