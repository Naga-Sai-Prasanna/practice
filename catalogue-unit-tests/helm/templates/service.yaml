apiVersion: v1
kind: Service
metadata: 
  name: catalogue
  namespace: {{ .Values.namespace }}
  labels:
        project: roboshop
        tier: backend
        component: catalogue

spec:  
  selector:
  # labels are used as selectors.so service add the pod which is having these labels.
    project: roboshop
    tier: backend
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port 