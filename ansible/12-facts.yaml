- name: gathering facts
  hosts: local
  connection: local
  tasks:
  - name: print facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: redhat family or not
    ansible.builtin.debug:
     msg: "yes redhat"    
    when: ansible_facts.os_family == "RedHat"

  - name: debian family or not
    ansible.builtin.debug:
     msg: "yed debian"    
    when: ansible_facts.os_family == "Debian"  