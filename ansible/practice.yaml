- name: filters
  hosts: local
  connection: local
  become: yes
  vars:
   topics: linux,shell,ansible,terraform
   course: "devops"   
   myIp: "124.45.35.35"   
   tagsMap:
    name: ansible
    project: roboshop
    component: cat

   tagsList: [
     { 
       "key": "name",
       "value": "ansible"
       
      },

     { "key": "name",
       "value": "ansible"
     }
   ]
      
  tasks:
  - name: greet
    ansible.builtin.debug:
     msg: "hi prassu, {{ greeting | default('gm') }}"

  - name: convert string to list 
    ansible.builtin.debug:
     msg: "{{ topics | split(',') }}"

  - name: convert map to list
    ansible.builtin.debug:
     msg: "{{ tagsMap | dict2items }}"  

  - name: convert  list to map 
    ansible.builtin.debug:
     msg: "{{ tagsList | items2dict }}"  
   
  - name: set
    ansible.builtin.set_fact:
     student_yaml: "{{ lookup('file', 'students.yaml' ) | from_json }}"

  - name: convert yaml to json
    ansible.builtin.debug:
     msg: "{{ student_yaml | to_nice_json }}"