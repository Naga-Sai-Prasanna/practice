apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 2Gi #should be less than or equal to your disk size
  
  csi:
   driver: ebs.csi.aws.com
   fsType: ext4
   volumeHandle: vol-08156017e4b298a4f #vol id take from cretaed volume


---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: "" # empty string must be explicity set otherwise default storageclass will be set
  volumeName: ebs # this is PV name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---

apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts: 
    - name: html-data
      mountPath: /usr/share/nginx/html
      nodeSelector:
        topology.kubernetes.io/zone: us-east-1d
  volumes:
  - name: html-data
    persistentVolumeClaim:
      claimName: ebs-static
