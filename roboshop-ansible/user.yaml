- name: user config
  hosts: user
  become: yes
  tasks:
  - name: enable user module
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
     name: nodejs
     state: present

  - name: add app user
    ansible.builtin.user:
     name: roboshop
     system: true
     home: /app
     shell: /sbin/nologin
     comment: "roboshop system user"  

  - name: delete app dir
    ansible.builtin.file:
     path: /app
     state: absent       

  - name: create app dir
    ansible.builtin.file:
     path: /app
     state: directory    

  - name: delete the zip file   
    ansible.builtin.file:
     path: /tmp/user.zip
     state: absent   
     

  - name: download the file   
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
     dest: /tmp/user.zip

  - name: unzip the file
    ansible.builtin.unarchive:
     src: /tmp/user.zip
     dest: /app
     remote_src: yes

  - name: install dependencies
    community.general.npm:
     path: /app
    

  - name: copy user system servie
    ansible.builtin.template:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: daemon reload
    ansible.builtin.systemd_service:
     daemon_reload: true    

  - name: start and enable the service
    ansible.builtin.service:
     name: catalogue
     state: restarted
     enabled: yes


