- name: cart config
  hosts: cart
  become: yes
  tasks:
  - name: enable cart module
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
     name: nodejs
     state: present

  - name: add app cart
    ansible.builtin.cart:
     name: roboshop
     system: true
     home: /app
     shell: /sbin/nologin
     comment: "roboshop system cart"  

  - name: delete app dir
    ansible.builtin.file:
     path: /app
     state: absent       

  - name: create app dir
    ansible.builtin.file:
     path: /app
     state: directory    

  - name: delete the zip file   
    ansible.builtin.file:
     path: /tmp/cart.zip
     state: absent   
     

  - name: download the file   
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
     dest: /tmp/cart.zip

  - name: unzip the file
    ansible.builtin.unarchive:
     src: /tmp/cart.zip
     dest: /app
     remote_src: yes

  - name: install dependencies
    community.general.npm:
     path: /app
    

  - name: copy cart system servie
    ansible.builtin.template:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: start and enable the service
    ansible.builtin.service:
     name: catalogue
     state: restarted
     enabled: yes
