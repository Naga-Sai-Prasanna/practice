- name: catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: enable nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
     name: nodejs
     state: present

  - name: create system user roboshop
    ansible.builtin.user:
     name: roboshop
     system: true
     home: /app
     shell: /sbin/nologin
     comment: "Roboshop system user"   

  - name: Delete dir
    ansible.builtin.file:
      path: /app
      state: absent     
 
  - name: create dir
    ansible.builtin.file:
      path: /app
      state: directory

  
  - name: deleting the zip file
    ansible.builtin.file:
     path: /tmp/catalogue.zip 
     state: absent

  - name: dowmloading the app
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
     dest: /tmp/catalogue.zip 

  - name: unzip the file
    ansible.builtin.unarchive:
     src: /tmp/catalogue.zip 
     dest: /app
     remote_src: yes # beacsue file is already in remote machine(catalogue)

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: copy catalogue services
    ansible.builtin.template:
     src: catalogue.service
     dest: /etc/systemd/system/catalogue.service

  - name: copy mongorepo
    ansible.builtin.copy:
     src: mongo.repo
     dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.dnf:
     name: mongodb-mongosh
     state: present

  - name: check the catalogue DB
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load data only if catalogue DB not found
    ansible.builtin.shell: mongosh --host  "{{ MONGODB_HOST }}"  </app/db/master-data.js   
    when: catalogue_output.stdout | int < 0

  - name: start and enable catalogue
    ansible.builtin.service:
     name: catalogue
     state: restarted
     enabled: yes
