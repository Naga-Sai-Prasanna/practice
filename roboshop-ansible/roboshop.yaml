- name: create ec2 instance 
  hosts: all
  connection: local
 
  vars:
   sg_id: sg-06cf4cbd02e607cf6  
   ami_id: ami-0220d79f3f480ecf5
   env: dev
   instances:
   - mongodb
   - catalogue
   

   domain_name: "prasanna.fun"
   action: create

  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
     instance_type: "t3.micro"
     security_group: "{{ sg_id }}"
     image_id: "{{ ami_id }}"
     name: "{{ item }}-{{ env }}"
     tags:
      Project: roboshop
      Component: "{{ item }}"
      Environment: "{{ env }}"
      Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"

  - name: print the output
    ansible.builtin.debug:
     msg: "{{ ec2_output }}" 

  

  - name: create r53 record
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item}}-{{ env }}.{{ domain_name }}" # mongodb-dev.prasana.fun frontend-dev.prasanna.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"  
    when: action == "create"


  
  - name: create r53 record for frontend for users
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" # mongodb-dev.prasana.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"  
    when: 
    - item.item == "frontend"
    - action == "create"
  
  
  - name: delete route53
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}" # mongodb-dev.prasana.fun
      type: A
      ttl: 1
    loop: "{{ instances }}"  
    when: action == "destroy"
    wait: false
  
  


  - name: delete instance
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"  
    when: action == "destroy"
    wait: false
