- name: payment config
  hosts: payment
  become: yes
  tasks:
  - name: install python
    ansible.builtin.pip:
     name: "{{ item }}"
     state: present
    loop:
    - python3 
    - gcc 
    - python3-devel

  - name: add system user
    ansible.builtin.user:
     name: roboshop
     system: true
     home: /app
     shell: /sbin/nologin
     comment: "roboshop system user"

  - name: delete app dir
    ansible.builtin.file:
     path: /app
     state: absent   

  - name: create app dir
    ansible.builtin.file:
     path: /app
     state: directory

  - name: delete  the zip
    ansible.builtin.file:
     path: /tmp/payment.zip
     state: absent


  - name: download the code
    ansible.builtin.get_url:
     url:  https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
     dest: /tmp/payment.zip

  - name: unarchive the code
    ansible.builtin.unarchive:
     src: /tmp/payment.zip
     dest: /app
     remote_src: yes

  - name: install dependencies
    ansible.builtin.pip:
     requirements: requirements.txt
     executable: pip3.9

     

  - name: copy systemd service
    ansible.builtin.template:
     src: payment.service
     dest: /etc/systemd/system/payment.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start and enable
    ansible.builtin.service:
     name: payment
     state: present
     enabled: yes    



