apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-blue
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: frontend
    component: frontend
    version: blue
 

spec:
  replicas: 4
  selector: 
    # using these labels replica set selects the pod    
    matchLabels:
      tier: frontend
      component: frontend
      version: blue

    # this is pod definition, pod is subset of replica
  template:
    metadata: 
      labels:
         tier: frontend
         component: frontend
         version: blue
    spec:
     containers:
     - name: nginx-blue
       image: kopparthiprasanna/blue-green:0.0.1
