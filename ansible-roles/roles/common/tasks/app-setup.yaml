- name: create system user roboshop
  ansible.builtin.user:
    name: roboshop
    system: true
    home: /app
    shell: /sbin/nologin
    comment: "Roboshop system user"   

- name: Delete dir
  ansible.builtin.file:
    path: /app
    state: absent     

- name: create dir
  ansible.builtin.file:
    path: /app
    state: directory


- name: deleting the zip file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip 
    state: absent

- name: dowmloading the app
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
    dest: /tmp/{{ component }}.zip 

- name: unzip the file
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip 
    dest: /app
    remote_src: yes # beacsue file is already in remote machine({{ component }})
