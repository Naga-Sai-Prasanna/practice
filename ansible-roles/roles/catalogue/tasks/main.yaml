- name: app setup
  tags:
  - deployment
  ansible.builtin.import_role: # it will respect the tag.sop only that particular tasks under role will run.
   name: common
   tasks_from: app-setup.yaml


- name: nodejs setup
  tags:
  - deployment
  ansible.builtin.include_role:  # it wont respect the tag
  #ansible.builtin.import_role:
   name: common
   tasks_from: nodejs-setup.yaml



- name: systemd setup
  ansible.builtin.import_role:
   name: common
   tasks_from: systemd-setup.yaml


- name: copy mongorepo
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: load the data
  ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: load the products
  ansible.builtin.shell: mongosh --host  "{{ MONGODB_HOST }}"  </app/db/master-data.js   
  when: catalogue_output.stdout | int < 0

- name: start and enable catalogue
  tags:
  - deployment
  ansible.builtin.service:
    name: catalogue
    state: restarted
    enabled: yes

