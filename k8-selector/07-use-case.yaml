---
# here we have only 3 node if we apply 5 replicas then other 2 will be in pending state.
# if we wnat other 2 nodes also need to schedule then we use

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
spec:
  selector:
    matchLabels:
      app: web-store
  replicas: 5
  template:
    metadata:
      labels:
        app: web-store
    spec:
      # edit podantiafinity  to schedule other 2 
      affinity:
        podAntiAffinity:
         preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:  # for prefered only we write
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - web-store
              topologyKey: "kubernetes.io/zone"    
    
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - store
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: web-app
        image: nginx:1.16-alpine