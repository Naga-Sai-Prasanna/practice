# nodeselector

apiVersion: v1
kind: Pod
metadata:
  name: nginx-tolerated
  labels:
    env: test
spec:
  containers:
  - name: nginx
    image: nginx
    # asking vip room
  nodeSelector:
    project: roboshop  
    # showing reservation form
  tolerations:
  - key: "project"
    operator: "Equal"
    value: "roboshop"
    effect: "NoSchedule"