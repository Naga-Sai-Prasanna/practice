apiVersion: v1
kind: Pod
metadata:
  name: nginx-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:     
            - us-east-1f  # change to your zone
            - us-east-1c    # for soft rule adding
           # soft rule 
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshopppppp
  
          # for another pod with different affinity weight  rules
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - amazon      
  containers:
  - name: nginx
    image: nginx
