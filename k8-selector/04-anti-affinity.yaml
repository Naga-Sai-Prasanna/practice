# pod wont go to all nodes so it shows pending

apiVersion: v1
kind: Pod
metadata:
  name: nginx-anti-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
    # hard rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: NotIn
            values:     
            - us-east-1f 
            - us-east-1c
            # change to your zone
  containers:
  - name: nginx
    image: nginx          